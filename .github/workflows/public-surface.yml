name: public-surface

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci
      - name: Run public-surface check
        run: node scripts/check-public-surface.mjs
