name: public-metadata

# Validate the current reference index, immutable archive index, per-entry
# licenses, digests, current Asset/Cluster toolchain paths, onboarding
# separation, and GitHub Release consistency. No private repository is cloned.

on:
  push:
    branches: [main]
    paths:
      - 'index/**'
      - 'archive/**'
      - 'references/**'
      - 'clusters/**'
      - 'schemas/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE-POLICY.md'
      - 'ENTRY-CONTRACT.md'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'index/**'
      - 'archive/**'
      - 'references/**'
      - 'clusters/**'
      - 'schemas/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE-POLICY.md'
      - 'ENTRY-CONTRACT.md'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/public-metadata.yml'
      - '.github/pull_request_template.md'

jobs:
  public-metadata:
    name: Gate 9 — public metadata truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history keeps archive moves and checksum provenance reviewable.
          fetch-depth: 0

      - name: Install repository checks and official KDNA CLI
        run: |
          npm ci
          npm install -g @aikdna/kdna-cli@0.31.1

      - name: Run fixture suite
        run: npm test

      - name: Run public metadata audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/audit-public-metadata.py --online-releases
