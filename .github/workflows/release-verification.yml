name: release-verification

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Assert HEAD matches release tag
        run: |
          TAG_REF=$(git rev-parse "refs/tags/${{ github.event.release.tag_name }}" 2>/dev/null || echo '')
          HEAD_REF=$(git rev-parse HEAD)
          test "$TAG_REF" = "$HEAD_REF" || {
            echo "HEAD ($HEAD_REF) does not match tag ${{ github.event.release.tag_name }} ($TAG_REF)"
            exit 1
          }
      - name: Install repository dependencies
        run: npm ci
      - name: Run fixture suite
        run: npm test
      - name: Run local audit
        run: npm run audit
      - name: Run online release consistency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-release-consistency.mjs --online
